<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TorrentHunt — Receive a file</title>
<style>
  :root {
    --bg: #0a0a0b; --panel: #141416; --border: #26262a;
    --text: #f4f4f5; --muted: #9a9aa2; --accent: #ffffff; --accent-fg: #0a0a0b;
    --green: #22c55e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    width: min(640px, 100%); background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
  }
  .head { display: flex; align-items: center; gap: 10px; padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .logo { width: 30px; height: 30px; border-radius: 8px; background: var(--accent); color: var(--accent-fg);
    display: flex; align-items: center; justify-content: center; font-weight: 800; }
  .head h1 { font-size: 15px; margin: 0; font-weight: 650; }
  .head p { margin: 1px 0 0; font-size: 12px; color: var(--muted); }
  .body { padding: 20px; }
  .status { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex: none; }
  .dot.live { background: var(--green); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)} 70%{box-shadow:0 0 0 7px rgba(34,197,94,0)} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} }
  .bar { height: 6px; background: #000; border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
  .bar > div { height: 100%; width: 0; background: var(--accent); transition: width .3s ease; }
  .meta { display: flex; gap: 16px; font-size: 12px; color: var(--muted); margin-bottom: 16px; font-variant-numeric: tabular-nums; }
  .files { display: flex; flex-direction: column; gap: 8px; }
  .file { display: flex; align-items: center; gap: 12px; padding: 11px 13px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; }
  .file .name { flex: 1; min-width: 0; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file .size { font-size: 12px; color: var(--muted); flex: none; }
  .btn { border: 1px solid var(--accent); background: var(--accent); color: var(--accent-fg);
    border-radius: 8px; padding: 7px 12px; font-size: 12.5px; font-weight: 600; cursor: pointer; flex: none; text-decoration: none; }
  .btn.ghost { background: transparent; color: var(--text); border-color: var(--border); }
  .btn[disabled] { opacity: .5; cursor: default; }
  .hint { margin-top: 16px; font-size: 12px; color: var(--muted); line-height: 1.5; }
  .error { color: #f87171; }
  #media { margin-top: 14px; }
  #media video, #media audio { width: 100%; border-radius: 10px; background: #000; outline: none; }
  a { color: var(--text); }
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="logo">T</div>
      <div>
        <h1>TorrentHunt — Receive a file</h1>
        <p>Peer-to-peer in your browser. No install, no cloud.</p>
      </div>
    </div>
    <div class="body">
      <div class="status"><span class="dot" id="dot"></span><span id="status">Connecting…</span></div>
      <div class="bar"><div id="prog"></div></div>
      <div class="meta">
        <span id="pct">0%</span>
        <span id="speed">0 KB/s</span>
        <span id="peers">0 peers</span>
      </div>
      <div class="files" id="files"></div>
      <div id="media"></div>
      <div class="hint" id="hint">
        The sender must keep TorrentHunt open while you download. If nothing happens,
        ask them to re-open the share, or try again in a moment.
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/webtorrent@1.9.7/webtorrent.min.js"></script>
<script>
  (function () {
    var $ = function (id) { return document.getElementById(id); };
    function fmt(b) {
      if (!b) return '0 B';
      var u = ['B','KB','MB','GB','TB'], i = Math.floor(Math.log(b) / Math.log(1024));
      return (b / Math.pow(1024, i)).toFixed(i ? 1 : 0) + ' ' + u[i];
    }
    function setStatus(text, live) {
      $('status').textContent = text;
      $('dot').className = 'dot' + (live ? ' live' : '');
    }
    function fail(msg) { setStatus(msg, false); $('status').className = 'error'; }

    // The link carries either a bare infoHash (new, short links) or a full
    // magnet (older links). For an infoHash we rebuild the magnet here, adding
    // the same WebSocket trackers the desktop seeder announces to.
    var TRACKERS = [
      'wss://tracker.openwebtorrent.com',
      'wss://tracker.webtorrent.dev',
      'wss://tracker.files.fm:7073/announce'
    ];
    var raw = '';
    try { raw = decodeURIComponent(location.hash.replace(/^#/, '')); } catch (e) {}
    var magnet = '';
    if (raw.indexOf('magnet:') === 0) {
      magnet = raw;
    } else if (/^[a-fA-F0-9]{40}$/.test(raw) || /^[a-zA-Z2-7]{32}$/.test(raw)) {
      magnet = 'magnet:?xt=urn:btih:' + raw +
        TRACKERS.map(function (t) { return '&tr=' + encodeURIComponent(t); }).join('');
    }
    if (!magnet) {
      fail('Invalid or missing share link.');
      return;
    }
    if (typeof WebTorrent === 'undefined' || !WebTorrent.WEBRTC_SUPPORT) {
      fail('Your browser does not support WebRTC downloads. Try Chrome, Edge or Firefox on desktop.');
      return;
    }

    var client = new WebTorrent();
    client.on('error', function (e) { fail('Error: ' + (e && e.message ? e.message : e)); });

    setStatus('Connecting to the sender…', true);

    var MEDIA_RX = /\.(mp4|m4v|webm|ogv|ogg|mp3|m4a|aac|wav|flac|opus|mov)$/i;
    var rendered = false;

    client.add(magnet, function (torrent) {
      setStatus('Connected — downloading', true);

      function renderFiles() {
        if (rendered) return; rendered = true;
        var wrap = $('files'); wrap.innerHTML = '';
        torrent.files.forEach(function (file) {
          var row = document.createElement('div'); row.className = 'file';
          var name = document.createElement('div'); name.className = 'name'; name.textContent = file.name; name.title = file.name;
          var size = document.createElement('div'); size.className = 'size'; size.textContent = fmt(file.length);
          row.appendChild(name); row.appendChild(size);

          if (MEDIA_RX.test(file.name)) {
            var play = document.createElement('button'); play.className = 'btn ghost'; play.textContent = 'Preview';
            play.onclick = function () { $('media').innerHTML = ''; file.appendTo('#media', { autoplay: true, controls: true }); };
            row.appendChild(play);
          }

          var dl = document.createElement('button'); dl.className = 'btn'; dl.textContent = 'Download';
          dl.onclick = function () {
            dl.disabled = true; dl.textContent = 'Preparing…';
            file.getBlobURL(function (err, url) {
              if (err) { dl.disabled = false; dl.textContent = 'Download'; return; }
              var a = document.createElement('a'); a.href = url; a.download = file.name; document.body.appendChild(a); a.click(); a.remove();
              dl.disabled = false; dl.textContent = 'Download';
            });
          };
          row.appendChild(dl);
          wrap.appendChild(row);
        });
      }

      if (torrent.files && torrent.files.length) renderFiles();
      torrent.on('ready', renderFiles);

      torrent.on('download', function () {
        var pct = Math.round(torrent.progress * 100);
        $('prog').style.width = pct + '%';
        $('pct').textContent = pct + '%';
        $('speed').textContent = fmt(torrent.downloadSpeed) + '/s';
        $('peers').textContent = torrent.numPeers + ' peer' + (torrent.numPeers === 1 ? '' : 's');
      });

      torrent.on('done', function () {
        setStatus('Download complete', false);
        $('prog').style.width = '100%'; $('pct').textContent = '100%'; $('speed').textContent = '0 KB/s';
      });

      torrent.on('wire', function () { $('peers').textContent = torrent.numPeers + ' peers'; });
    });

    // If no peers after a while, nudge the user.
    setTimeout(function () {
      var t = client.torrents[0];
      if (t && t.numPeers === 0 && t.progress === 0) {
        setStatus('Waiting for the sender — is their TorrentHunt open?', true);
      }
    }, 12000);
  })();
</script>
</body>
</html>
